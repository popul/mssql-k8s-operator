---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: scheduledbackups.mssql.popul.io
spec:
  group: mssql.popul.io
  names:
    categories:
    - mssql
    kind: ScheduledBackup
    listKind: ScheduledBackupList
    plural: scheduledbackups
    shortNames:
    - msschedbak
    singular: scheduledbackup
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.databaseName
      name: Database
      type: string
    - jsonPath: .spec.schedule
      name: Schedule
      type: string
    - jsonPath: .spec.suspend
      name: Suspend
      type: boolean
    - jsonPath: .status.lastScheduleTime
      name: Last
      type: date
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ScheduledBackup is the Schema for the scheduledbackups API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ScheduledBackupSpec defines the desired state of a ScheduledBackup.
            properties:
              compression:
                default: false
                description: Compression enables backup compression.
                type: boolean
              databaseName:
                description: DatabaseName is the database to back up.
                minLength: 1
                type: string
              destinationTemplate:
                description: |-
                  DestinationTemplate is a Go template for the backup file path.
                  Available variables: {{.DatabaseName}}, {{.Timestamp}}, {{.Type}}.
                  Example: /backups/{{.DatabaseName}}-{{.Timestamp}}.bak
                minLength: 1
                type: string
              retention:
                description: Retention defines the retention policy for old backups.
                properties:
                  maxAge:
                    description: |-
                      MaxAge is the maximum age of a backup to retain (e.g. "168h" for 7 days).
                      Backups older than this are deleted.
                    type: string
                  maxCount:
                    description: |-
                      MaxCount is the maximum number of successful backups to retain.
                      Older backups beyond this count are deleted. 0 means unlimited.
                    format: int32
                    minimum: 0
                    type: integer
                type: object
              schedule:
                description: |-
                  Schedule is a cron expression (e.g. "0 2 * * *" for 2 AM daily).
                  Uses standard 5-field cron format.
                minLength: 1
                type: string
              server:
                description: Server defines the SQL Server connection details.
                properties:
                  credentialsSecret:
                    description: |-
                      CredentialsSecret references a Secret containing "username" and "password" keys.
                      Required when sqlServerRef is not set and authMethod is SqlLogin.
                    properties:
                      name:
                        description: Name of the Secret.
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                  host:
                    description: |-
                      Host is the hostname or IP of the SQL Server instance.
                      Required when sqlServerRef is not set.
                    type: string
                  port:
                    default: 1433
                    description: Port is the port number. Defaults to 1433.
                    format: int32
                    type: integer
                  sqlServerRef:
                    description: |-
                      SQLServerRef references a SQLServer CR by name. When set, host/port/credentials/tls
                      are inherited from the SQLServer CR and should not be specified inline.
                    type: string
                  tls:
                    default: false
                    description: TLS enables TLS encryption for the SQL Server connection.
                    type: boolean
                type: object
              suspend:
                default: false
                description: Suspend stops the schedule from creating new backups
                  when true.
                type: boolean
              type:
                default: Full
                description: 'Type is the backup type: Full, Differential, or Log.'
                enum:
                - Full
                - Differential
                - Log
                type: string
            required:
            - databaseName
            - destinationTemplate
            - schedule
            - server
            type: object
          status:
            description: ScheduledBackupStatus defines the observed state of a ScheduledBackup.
            properties:
              activeBackup:
                description: ActiveBackup is the name of the currently running Backup
                  CR, if any.
                type: string
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              failedBackups:
                description: FailedBackups is the number of failed backups.
                format: int32
                type: integer
              history:
                description: History contains the last N backup executions.
                items:
                  description: ScheduledBackupHistory records a single backup execution.
                  properties:
                    backupName:
                      description: BackupName is the name of the generated Backup
                        CR.
                      type: string
                    completionTime:
                      description: CompletionTime is when this backup completed.
                      format: date-time
                      type: string
                    destination:
                      description: Destination is the file path of the backup.
                      type: string
                    phase:
                      description: Phase is the final phase of this backup.
                      type: string
                    startTime:
                      description: StartTime is when this backup started.
                      format: date-time
                      type: string
                  required:
                  - backupName
                  type: object
                type: array
              lastScheduleTime:
                description: LastScheduleTime is the last time a Backup was created
                  from this schedule.
                format: date-time
                type: string
              lastSuccessfulBackup:
                description: LastSuccessfulBackup is the name of the last successfully
                  completed Backup.
                type: string
              nextScheduleTime:
                description: NextScheduleTime is the next time a Backup will be created.
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
              successfulBackups:
                description: SuccessfulBackups is the number of successful backups.
                format: int32
                type: integer
              totalBackups:
                description: TotalBackups is the total number of backups created by
                  this schedule.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
