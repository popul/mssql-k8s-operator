---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: databases.mssql.popul.io
spec:
  group: mssql.popul.io
  names:
    categories:
    - mssql
    kind: Database
    listKind: DatabaseList
    plural: databases
    shortNames:
    - msdb
    singular: database
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.databaseName
      name: Database
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Database is the Schema for the databases API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: DatabaseSpec defines the desired state of a SQL Server database.
            properties:
              collation:
                description: Collation for the database. Immutable after creation.
                type: string
              compatibilityLevel:
                description: CompatibilityLevel sets the database compatibility level
                  (e.g. 160 for SQL 2022).
                format: int32
                maximum: 170
                minimum: 100
                type: integer
              databaseName:
                description: DatabaseName is the name of the database on SQL Server.
                minLength: 1
                type: string
              deletionPolicy:
                default: Retain
                description: DeletionPolicy determines whether to DROP or RETAIN the
                  database on CR deletion.
                enum:
                - Delete
                - Retain
                type: string
              options:
                description: Options sets database-level options (e.g. ALLOW_SNAPSHOT_ISOLATION).
                items:
                  description: DatabaseOption represents a boolean database option
                    (SET ON/OFF).
                  properties:
                    name:
                      description: Name is the database option name (e.g. ALLOW_SNAPSHOT_ISOLATION,
                        READ_COMMITTED_SNAPSHOT).
                      minLength: 1
                      type: string
                    value:
                      description: Value enables or disables the option.
                      type: boolean
                  required:
                  - name
                  - value
                  type: object
                type: array
              owner:
                description: Owner sets the database owner (ALTER AUTHORIZATION).
                type: string
              recoveryModel:
                description: |-
                  RecoveryModel sets the database recovery model (Full, Simple, BulkLogged).
                  Full is required for transaction log backups and point-in-time restore.
                enum:
                - Full
                - Simple
                - BulkLogged
                type: string
              server:
                description: Server defines the SQL Server connection details.
                properties:
                  credentialsSecret:
                    description: |-
                      CredentialsSecret references a Secret containing "username" and "password" keys.
                      Required when sqlServerRef is not set and authMethod is SqlLogin.
                    properties:
                      name:
                        description: Name of the Secret.
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                  host:
                    description: |-
                      Host is the hostname or IP of the SQL Server instance.
                      Required when sqlServerRef is not set.
                    type: string
                  port:
                    default: 1433
                    description: Port is the port number. Defaults to 1433.
                    format: int32
                    type: integer
                  sqlServerRef:
                    description: |-
                      SQLServerRef references a SQLServer CR by name. When set, host/port/credentials/tls
                      are inherited from the SQLServer CR and should not be specified inline.
                    type: string
                  tls:
                    default: false
                    description: TLS enables TLS encryption for the SQL Server connection.
                    type: boolean
                type: object
            required:
            - databaseName
            - server
            type: object
          status:
            description: DatabaseStatus defines the observed state of a SQL Server
              database.
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the database's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
