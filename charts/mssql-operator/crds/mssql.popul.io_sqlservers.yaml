---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: sqlservers.mssql.popul.io
spec:
  group: mssql.popul.io
  names:
    categories:
    - mssql
    kind: SQLServer
    listKind: SQLServerList
    plural: sqlservers
    shortNames:
    - mssrv
    singular: sqlserver
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.host
      name: Host
      type: string
    - jsonPath: .spec.port
      name: Port
      type: integer
    - jsonPath: .spec.authMethod
      name: Auth
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.serverVersion
      name: Version
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          SQLServer is the Schema for the sqlservers API.
          It defines a shared SQL Server connection that other CRDs can reference via serverRef.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SQLServerSpec defines the desired state of a shared SQL Server
              connection reference.
            properties:
              authMethod:
                default: SqlLogin
                description: AuthMethod defines the authentication method. Defaults
                  to SqlLogin.
                enum:
                - SqlLogin
                - AzureAD
                - ManagedIdentity
                type: string
              azureAD:
                description: |-
                  AzureAD contains Azure AD authentication configuration.
                  Required when authMethod is AzureAD.
                properties:
                  clientID:
                    description: ClientID is the Azure AD application (client) ID.
                    minLength: 1
                    type: string
                  clientSecretRef:
                    description: ClientSecretRef references a Secret containing the
                      "clientSecret" key.
                    properties:
                      name:
                        description: Name of the Secret.
                        minLength: 1
                        type: string
                      namespace:
                        description: Namespace of the Secret. If empty, defaults to
                          the namespace of the referencing resource.
                        type: string
                    required:
                    - name
                    type: object
                  tenantID:
                    description: TenantID is the Azure AD tenant ID.
                    minLength: 1
                    type: string
                required:
                - clientID
                - tenantID
                type: object
              connectionTimeout:
                default: 30
                description: ConnectionTimeout is the connection timeout in seconds.
                format: int32
                maximum: 300
                minimum: 5
                type: integer
              credentialsSecret:
                description: |-
                  CredentialsSecret references a Secret containing "username" and "password" keys.
                  Required when authMethod is SqlLogin.
                properties:
                  name:
                    description: Name of the Secret.
                    minLength: 1
                    type: string
                  namespace:
                    description: Namespace of the Secret. If empty, defaults to the
                      namespace of the referencing resource.
                    type: string
                required:
                - name
                type: object
              host:
                description: Host is the hostname or IP of the SQL Server instance.
                minLength: 1
                type: string
              managedIdentity:
                description: |-
                  ManagedIdentity contains Managed Identity authentication configuration.
                  Required when authMethod is ManagedIdentity.
                properties:
                  clientID:
                    description: |-
                      ClientID is the user-assigned managed identity client ID.
                      Leave empty for system-assigned identity.
                    type: string
                type: object
              maxConnections:
                default: 10
                description: MaxConnections is the maximum number of connections in
                  the pool for this server.
                format: int32
                maximum: 100
                minimum: 1
                type: integer
              port:
                default: 1433
                description: Port is the port number. Defaults to 1433.
                format: int32
                type: integer
              tls:
                default: false
                description: TLS enables TLS encryption for the SQL Server connection.
                type: boolean
            required:
            - host
            type: object
          status:
            description: SQLServerStatus defines the observed state of a SQL Server
              connection.
            properties:
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              edition:
                description: Edition is the SQL Server edition (e.g. "Enterprise",
                  "Standard", "Express").
                type: string
              lastConnectedTime:
                description: LastConnectedTime is when the operator last successfully
                  connected.
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
              serverVersion:
                description: ServerVersion is the SQL Server version string (e.g.
                  "16.0.4135.4").
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
