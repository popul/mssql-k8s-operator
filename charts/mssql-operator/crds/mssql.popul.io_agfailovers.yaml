---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: agfailovers.mssql.popul.io
spec:
  group: mssql.popul.io
  names:
    categories:
    - mssql
    kind: AGFailover
    listKind: AGFailoverList
    plural: agfailovers
    shortNames:
    - msagfo
    singular: agfailover
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.agName
      name: AG
      type: string
    - jsonPath: .spec.targetReplica
      name: Target
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.previousPrimary
      name: Previous
      priority: 1
      type: string
    - jsonPath: .status.newPrimary
      name: New
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: AGFailover is the Schema for one-shot AG failover operations.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AGFailoverSpec defines the desired failover operation.
            properties:
              agName:
                description: AGName is the name of the Availability Group to failover.
                minLength: 1
                type: string
              force:
                default: false
                description: |-
                  Force allows failover to an asynchronous replica, accepting potential data loss.
                  Requires the annotation mssql.popul.io/confirm-data-loss: "yes".
                type: boolean
              server:
                description: Server connection details for the target replica.
                properties:
                  credentialsSecret:
                    description: CredentialsSecret references a Secret containing
                      "username" and "password" keys.
                    properties:
                      name:
                        description: Name of the Secret.
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                  host:
                    description: Host is the hostname or IP of the SQL Server instance.
                    minLength: 1
                    type: string
                  port:
                    default: 1433
                    description: Port is the port number. Defaults to 1433.
                    format: int32
                    type: integer
                  tls:
                    default: false
                    description: TLS enables TLS encryption for the SQL Server connection.
                    type: boolean
                required:
                - credentialsSecret
                - host
                type: object
              targetReplica:
                description: |-
                  TargetReplica is the server name of the secondary to promote to primary.
                  The operator connects to this replica to execute the FAILOVER command.
                minLength: 1
                type: string
            required:
            - agName
            - server
            - targetReplica
            type: object
          status:
            description: AGFailoverStatus defines the observed state of the failover
              operation.
            properties:
              completionTime:
                description: CompletionTime is when the failover completed.
                format: date-time
                type: string
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              newPrimary:
                description: NewPrimary is the server name of the primary after failover.
                type: string
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
              phase:
                description: 'Phase is the current phase: Pending, Running, Completed,
                  Failed.'
                enum:
                - Pending
                - Running
                - Completed
                - Failed
                type: string
              previousPrimary:
                description: PreviousPrimary is the server name of the primary before
                  failover.
                type: string
              startTime:
                description: StartTime is when the failover started.
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
