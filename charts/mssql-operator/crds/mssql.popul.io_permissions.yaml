---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: permissions.mssql.popul.io
spec:
  group: mssql.popul.io
  names:
    categories:
    - mssql
    kind: Permission
    listKind: PermissionList
    plural: permissions
    shortNames:
    - msperm
    singular: permission
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.databaseName
      name: Database
      type: string
    - jsonPath: .spec.userName
      name: User
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Permission is the Schema for the permissions API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: PermissionSpec defines the desired state of SQL Server permissions
              for a user.
            properties:
              databaseName:
                description: DatabaseName is the target database.
                minLength: 1
                type: string
              denies:
                description: Denies is the list of permissions to DENY.
                items:
                  description: PermissionEntry represents a single permission grant
                    or deny.
                  properties:
                    "on":
                      description: On is the target scope (e.g. "SCHEMA::app", "OBJECT::dbo.Users",
                        "DATABASE::myapp").
                      minLength: 1
                      type: string
                    permission:
                      description: Permission is the SQL Server permission (e.g. SELECT,
                        INSERT, UPDATE, DELETE, EXECUTE, ALTER, CONTROL).
                      minLength: 1
                      type: string
                  required:
                  - "on"
                  - permission
                  type: object
                type: array
              grants:
                description: Grants is the list of permissions to GRANT.
                items:
                  description: PermissionEntry represents a single permission grant
                    or deny.
                  properties:
                    "on":
                      description: On is the target scope (e.g. "SCHEMA::app", "OBJECT::dbo.Users",
                        "DATABASE::myapp").
                      minLength: 1
                      type: string
                    permission:
                      description: Permission is the SQL Server permission (e.g. SELECT,
                        INSERT, UPDATE, DELETE, EXECUTE, ALTER, CONTROL).
                      minLength: 1
                      type: string
                  required:
                  - "on"
                  - permission
                  type: object
                type: array
              server:
                description: Server defines the SQL Server connection details.
                properties:
                  credentialsSecret:
                    description: |-
                      CredentialsSecret references a Secret containing "username" and "password" keys.
                      Required when sqlServerRef is not set and authMethod is SqlLogin.
                    properties:
                      name:
                        description: Name of the Secret.
                        type: string
                    required:
                    - name
                    type: object
                  host:
                    description: |-
                      Host is the hostname or IP of the SQL Server instance.
                      Required when sqlServerRef is not set.
                    type: string
                  port:
                    default: 1433
                    description: Port is the port number. Defaults to 1433.
                    format: int32
                    type: integer
                  sqlServerRef:
                    description: |-
                      SQLServerRef references a SQLServer CR by name. When set, host/port/credentials/tls
                      are inherited from the SQLServer CR and should not be specified inline.
                    type: string
                  tls:
                    default: false
                    description: TLS enables TLS encryption for the SQL Server connection.
                    type: boolean
                type: object
              userName:
                description: UserName is the database user to grant/deny permissions
                  to.
                minLength: 1
                type: string
            required:
            - databaseName
            - server
            - userName
            type: object
          status:
            description: PermissionStatus defines the observed state of SQL Server
              permissions.
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the permission's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
