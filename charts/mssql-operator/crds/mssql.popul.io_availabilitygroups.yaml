---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: availabilitygroups.mssql.popul.io
spec:
  group: mssql.popul.io
  names:
    categories:
    - mssql
    kind: AvailabilityGroup
    listKind: AvailabilityGroupList
    plural: availabilitygroups
    shortNames:
    - msag
    singular: availabilitygroup
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.agName
      name: AG
      type: string
    - jsonPath: .status.primaryReplica
      name: Primary
      type: string
    - jsonPath: .spec.replicas[*].serverName
      name: Replicas
      priority: 1
      type: integer
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: AvailabilityGroup is the Schema for the availabilitygroups API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AvailabilityGroupSpec defines the desired state of an Always
              On Availability Group.
            properties:
              agName:
                description: AGName is the name of the Availability Group on SQL Server.
                minLength: 1
                type: string
              autoFailover:
                default: false
                description: |-
                  AutoFailover enables automatic failover when the primary becomes unreachable.
                  The operator monitors all replicas and triggers failover to the best secondary.
                type: boolean
              automatedBackupPreference:
                default: Secondary
                description: AutomatedBackupPreference determines where automated
                  backups run.
                enum:
                - Primary
                - SecondaryOnly
                - Secondary
                - None
                type: string
              clusterType:
                default: External
                description: |-
                  ClusterType specifies the cluster manager: WSFC, External (Pacemaker), or None.
                  None allows AG creation without a cluster manager (manual failover only).
                enum:
                - WSFC
                - External
                - None
                type: string
              databases:
                description: Databases to include in the Availability Group.
                items:
                  description: AGDatabaseSpec defines a database to include in the
                    Availability Group.
                  properties:
                    name:
                      description: Name is the database name to add to the AG.
                      minLength: 1
                      type: string
                  required:
                  - name
                  type: object
                type: array
              dbFailover:
                default: true
                description: DBFailover enables database-level health detection for
                  automatic failover.
                type: boolean
              failoverCooldown:
                default: 60s
                description: FailoverCooldown is the minimum time between automatic
                  failovers to prevent flapping.
                type: string
              healthCheckInterval:
                default: 10s
                description: HealthCheckInterval is how often to check replica health
                  when autoFailover is enabled.
                type: string
              listener:
                description: Listener configures the AG listener (virtual DNS endpoint).
                properties:
                  ipAddresses:
                    description: IP addresses for the listener. On Kubernetes, this
                      is typically managed by a Service.
                    items:
                      description: AGListenerIP defines a listener IP address with
                        subnet mask.
                      properties:
                        ip:
                          description: IP is the listener IP address.
                          type: string
                        subnetMask:
                          description: SubnetMask is the subnet mask (e.g. "255.255.255.0").
                          type: string
                      required:
                      - ip
                      - subnetMask
                      type: object
                    type: array
                  name:
                    description: Name is the listener DNS name.
                    minLength: 1
                    type: string
                  port:
                    default: 1433
                    description: Port is the TCP port the listener listens on.
                    format: int32
                    type: integer
                required:
                - name
                type: object
              replicas:
                description: |-
                  Replicas defines the SQL Server instances participating in the AG.
                  The first replica is assumed to be the initial primary.
                items:
                  description: AGReplicaSpec defines a replica participating in the
                    Availability Group.
                  properties:
                    availabilityMode:
                      default: SynchronousCommit
                      description: 'AvailabilityMode is the synchronization mode:
                        SynchronousCommit or AsynchronousCommit.'
                      enum:
                      - SynchronousCommit
                      - AsynchronousCommit
                      type: string
                    endpointURL:
                      description: EndpointURL is the database mirroring endpoint
                        (e.g. "TCP://sql-0.sql-headless:5022").
                      minLength: 1
                      type: string
                    failoverMode:
                      default: Automatic
                      description: FailoverMode is Automatic or Manual. Automatic
                        requires SynchronousCommit.
                      enum:
                      - Automatic
                      - Manual
                      type: string
                    secondaryRole:
                      default: "No"
                      description: SecondaryRole defines read access on this replica
                        when it is secondary.
                      enum:
                      - AllowAllConnections
                      - AllowReadIntentOnly
                      - "No"
                      type: string
                    seedingMode:
                      default: Automatic
                      description: 'SeedingMode determines how data is initially populated:
                        Automatic or Manual.'
                      enum:
                      - Automatic
                      - Manual
                      type: string
                    server:
                      description: |-
                        Server connection details for this specific replica.
                        The operator connects to each replica to execute JOIN commands on secondaries.
                      properties:
                        credentialsSecret:
                          description: |-
                            CredentialsSecret references a Secret containing "username" and "password" keys.
                            Required when sqlServerRef is not set and authMethod is SqlLogin.
                          properties:
                            name:
                              description: Name of the Secret.
                              minLength: 1
                              type: string
                          required:
                          - name
                          type: object
                        host:
                          description: |-
                            Host is the hostname or IP of the SQL Server instance.
                            Required when sqlServerRef is not set.
                          type: string
                        port:
                          default: 1433
                          description: Port is the port number. Defaults to 1433.
                          format: int32
                          type: integer
                        sqlServerRef:
                          description: |-
                            SQLServerRef references a SQLServer CR by name. When set, host/port/credentials/tls
                            are inherited from the SQLServer CR and should not be specified inline.
                          type: string
                        tls:
                          default: false
                          description: TLS enables TLS encryption for the SQL Server
                            connection.
                          type: boolean
                      type: object
                    serverName:
                      description: ServerName is the SQL Server instance name (e.g.
                        "sql-0" or "sql-0.sql-headless.ns.svc").
                      minLength: 1
                      type: string
                  required:
                  - endpointURL
                  - server
                  - serverName
                  type: object
                minItems: 2
                type: array
            required:
            - agName
            - replicas
            type: object
          status:
            description: AvailabilityGroupStatus defines the observed state of an
              Availability Group.
            properties:
              autoFailoverCount:
                description: AutoFailoverCount is the total number of automatic failovers
                  executed.
                format: int32
                type: integer
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              databases:
                description: Databases shows the observed state of each database in
                  the AG.
                items:
                  description: AGDatabaseStatus represents the observed state of a
                    database in the AG.
                  properties:
                    joined:
                      description: Joined indicates whether the database has joined
                        the AG on all replicas.
                      type: boolean
                    name:
                      description: Name is the database name.
                      type: string
                    synchronizationState:
                      description: SynchronizationState is SYNCHRONIZED, SYNCHRONIZING,
                        or NOT_SYNCHRONIZING.
                      type: string
                  required:
                  - joined
                  - name
                  type: object
                type: array
              lastAutoFailoverTime:
                description: LastAutoFailoverTime records when the last automatic
                  failover was triggered.
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
              primaryReplica:
                description: PrimaryReplica is the server name of the current primary.
                type: string
              replicas:
                description: Replicas shows the observed state of each replica.
                items:
                  description: AGReplicaStatus represents the observed state of a
                    replica.
                  properties:
                    connected:
                      description: Connected indicates whether the replica is connected
                        to the AG.
                      type: boolean
                    role:
                      description: 'Role is the current role: PRIMARY, SECONDARY,
                        or RESOLVING.'
                      type: string
                    serverName:
                      description: ServerName identifies the replica.
                      type: string
                    synchronizationState:
                      description: SynchronizationState is SYNCHRONIZED, SYNCHRONIZING,
                        or NOT_SYNCHRONIZING.
                      type: string
                  required:
                  - connected
                  - serverName
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
