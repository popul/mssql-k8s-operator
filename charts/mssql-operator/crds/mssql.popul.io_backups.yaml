  name: backups.mssql.popul.io
spec:
  group: mssql.popul.io
  names:
    categories:
    - mssql
    kind: Backup
    listKind: BackupList
    plural: backups
    shortNames:
    - msbak
    singular: backup
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.databaseName
      name: Database
      type: string
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Backup is the Schema for the backups API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BackupSpec defines the desired state of a SQL Server backup.
            properties:
              compression:
                default: false
                description: Compression enables backup compression.
                type: boolean
              databaseName:
                description: DatabaseName is the database to back up.
                minLength: 1
                type: string
              destination:
                description: Destination is the file path on the SQL Server filesystem
                  (e.g. /var/opt/mssql/backups/mydb.bak).
                minLength: 1
                type: string
              server:
                description: Server defines the SQL Server connection details.
                properties:
                  credentialsSecret:
                    description: CredentialsSecret references a Secret containing
                      "username" and "password" keys.
                    properties:
                      name:
                        description: Name of the Secret.
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                  host:
                    description: Host is the hostname or IP of the SQL Server instance.
                    minLength: 1
                    type: string
                  port:
                    default: 1433
                    description: Port is the port number. Defaults to 1433.
                    format: int32
                    type: integer
                  tls:
                    default: false
                    description: TLS enables TLS encryption for the SQL Server connection.
                    type: boolean
                required:
                - credentialsSecret
                - host
                type: object
              type:
                default: Full
                description: 'Type is the backup type: Full, Differential, or Log.'
