{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mssql-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mssql-operator.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "mssql-operator.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
    - Ingress
  ingress:
    # Allow Prometheus scraping metrics
    - ports:
        - port: {{ .Values.metrics.port }}
          protocol: TCP
  egress:
    # Allow DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow Kubernetes API server
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
      {{- if .Values.networkPolicy.apiServerCIDR }}
      to:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.apiServerCIDR }}
      {{- end }}
    # Allow SQL Server connections
    - ports:
        - port: 1433
          protocol: TCP
      {{- if .Values.networkPolicy.sqlServerCIDR }}
      to:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.sqlServerCIDR }}
      {{- end }}
{{- end }}
