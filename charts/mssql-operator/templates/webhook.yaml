{{- if .Values.webhook.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mssql-operator.fullname" . }}-webhook
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mssql-operator.labels" . | nindent 4 }}
spec:
  ports:
    - port: 443
      targetPort: webhook
      protocol: TCP
      name: webhook
  selector:
    {{- include "mssql-operator.selectorLabels" . | nindent 4 }}
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ include "mssql-operator.fullname" . }}-selfsigned
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mssql-operator.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "mssql-operator.fullname" . }}-webhook-cert
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mssql-operator.labels" . | nindent 4 }}
spec:
  secretName: {{ include "mssql-operator.fullname" . }}-webhook-tls
  dnsNames:
    - {{ include "mssql-operator.fullname" . }}-webhook.{{ .Release.Namespace }}.svc
    - {{ include "mssql-operator.fullname" . }}-webhook.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    name: {{ include "mssql-operator.fullname" . }}-selfsigned
    kind: Issuer
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "mssql-operator.fullname" . }}-validating
  labels:
    {{- include "mssql-operator.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "mssql-operator.fullname" . }}-webhook-cert
webhooks:
  {{- $svcName := printf "%s-webhook" (include "mssql-operator.fullname" .) }}
  {{- $svcNamespace := .Release.Namespace }}
  {{- range $res := list "databases" "logins" "databaseusers" "backups" "restores" "schemas" "permissions" "availabilitygroups" }}
  - name: v{{ $res }}.kb.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: {{ $svcName }}
        namespace: {{ $svcNamespace }}
        path: /validate-mssql-popul-io-v1alpha1-{{ $res | trimSuffix "s" | trimSuffix "se" | trimSuffix "e" }}
    rules:
      - apiGroups: ["mssql.popul.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: [{{ $res | quote }}]
    failurePolicy: Fail
    sideEffects: None
  {{- end }}
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "mssql-operator.fullname" . }}-mutating
  labels:
    {{- include "mssql-operator.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "mssql-operator.fullname" . }}-webhook-cert
webhooks:
  {{- range $res := list "databases" "logins" "databaseusers" "backups" "restores" "schemas" "permissions" "availabilitygroups" }}
  - name: m{{ $res }}.kb.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: {{ $svcName }}
        namespace: {{ $svcNamespace }}
        path: /mutate-mssql-popul-io-v1alpha1-{{ $res | trimSuffix "s" | trimSuffix "se" | trimSuffix "e" }}
    rules:
      - apiGroups: ["mssql.popul.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: [{{ $res | quote }}]
    failurePolicy: Fail
    sideEffects: None
  {{- end }}
{{- end }}
